<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER SECURITY PORTAL</title>
    <style>
        :root {
            --bg-deep: #030712;
            --bg-card: rgba(17, 24, 39, 0.85);
            --neon-cyan: #00ffcc;
            --neon-blue: #3b82f6;
            --neon-red: #ff3b3b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --glow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 255, 204, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
        }
        .header-cyber {
            text-align: center;
            padding: 30px 15px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.2);
            margin-bottom: 30px;
        }
        .header-cyber h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 40%, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-cyber p {
            font-family: monospace;
            color: var(--neon-cyan);
            font-size: 0.85rem;
            margin-top: 6px;
            letter-spacing: 2px;
        }
        
        /* MONITOR DE IA */
        .ai-terminal {
            background: rgba(10, 15, 30, 0.9);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }
        .ai-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--neon-blue);
            margin-bottom: 10px;
        }
        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--neon-blue);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        .ai-text {
            font-family: monospace;
            font-size: 0.9rem;
            color: #e5e7eb;
            border-left: 3px solid var(--neon-cyan);
            padding-left: 12px;
            margin: 10px 0;
        }

        /* BARRA DE PESQUISA AVANÇADA */
        .search-wrapper {
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid rgba(0, 255, 204, 0.4);
            border-radius: 8px;
            padding: 6px;
            display: flex;
            gap: 10px;
            margin-bottom: 35px;
        }
        .search-box {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 15px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            font-family: monospace;
        }
        .search-btn {
            background: linear-gradient(135deg, var(--neon-blue), #1d4ed8);
            color: white;
            border: none;
            padding: 0 22px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .search-btn:hover {
            box-shadow: 0 0 10px var(--neon-blue);
            transform: scale(1.02);
        }
        
        /* SISTEMA DE CARDS DA ENGINE */
        .section-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            margin-bottom: 20px;
            border-left: 4px solid var(--neon-cyan);
            padding-left: 10px;
        }
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        .card-link {
            text-decoration: none;
            display: block;
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 22px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            border-color: var(--neon-cyan);
            box-shadow: var(--glow);
        }
        .card-meta {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--neon-cyan);
            font-weight: bold;
            margin-bottom: 8px;
        }
        .card h3 {
            font-size: 1.25rem;
            color: #ffffff;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .code-box {
            background: #020617;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #38bdf8;
            overflow-x: auto;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .tag {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #d1d5db;
            font-size: 0.7rem;
            font-family: monospace;
            padding: 4px 8px;
            border-radius: 4px;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 8px var(--neon-blue); }
            100% { transform: scale(0.9); opacity: 0.5; }
        }
    </style>
</head>
